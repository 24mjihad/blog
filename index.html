<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mo Jihad</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

  <main class="container">

    <!-- BIO SECTION -->
    <section class="bio">
      <h1 class="name">Mo Jihad</h1>
      <p class="bio-text">
        Hello! I am a CS student @ Harvard with a keen interest in astrophysics.
        I am also a national champion in rowing for Harvard.
      </p>
      <div class="links">
        <a href="mailto:you@example.com">Email</a>
        <span class="sep">·</span>
        <a href="https://github.com/yourhandle" target="_blank">GitHub</a>
        <span class="sep">·</span>
        <a href="https://twitter.com/yourhandle" target="_blank">Twitter</a>
        <span class="sep">·</span>
        <a href="assets/cv.pdf" target="_blank">CV</a>
      </div>
    </section>

    <hr class="divider" />

    <!-- BLOG SECTION -->
    <section class="blog">
      <h2 class="section-title">Blog</h2>
      <ul class="post-list" id="post-list">
        <!-- Populated by blog-data.js -->
      </ul>
    </section>

  </main>

  <script src="assets/load-posts.js"></script>
  <script src="assets/blog.js"></script>
  <script>
    const list = document.getElementById('post-list');

    function renderPosts() {
      const sorted = sortPosts(POSTS);

      if (sorted.length === 0) {
        const li = document.createElement('li');
        li.className = 'post-empty';
        li.textContent = 'No posts yet.';
        list.appendChild(li);
      } else {
        sorted.forEach(post => {
          const li = document.createElement('li');
          li.className = 'post-item';
          li.innerHTML = `
            <span class="post-date">${formatDate(post.date)}</span>
            <a class="post-title" href="post.html?id=${encodeURIComponent(post.id)}">${post.title}</a>
          `;
          list.appendChild(li);
        });
      }
    }

    fetchBlogPosts()
      .then(renderPosts)
      .catch(err => {
        list.innerHTML = `<li class="post-empty">Could not load posts: ${err.message}</li>`;
      });
  </script>
</body>
</html>
